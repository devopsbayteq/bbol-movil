# ios-ci.yaml
name: IOS Pipeline

on:
  workflow_dispatch:

jobs:
  
  build-ios:
    name: Construir IPA
    runs-on: macos-26

    env:
      NODE_VERSION: "22.x"
      IOS_WORKSPACE: "ios/BBApp.xcworkspace"
      IOS_SCHEME: "BBApp"
      IOS_CONFIGURATION: "Release"
      EXPORT_OPTIONS_PLIST: "ios/BBApp/Info.plist"
      DERIVED_DATA: "build/DerivedData"
      ARCHIVE_PATH: "build/BBApp.xcarchive"
      EXPORT_PATH: "build/export"

    steps:
      - uses: actions/checkout@v5

      - name: Obtener version macOS
        run: sw_vers

      - name: Configurar Nodejs 22
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Cocoa Pods (version from Podfile.lock)
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          podfile-path: ios/Podfile.lock

      - name: Instalar Pods
        run: |
          cd ios
          rm -rf Podfile.lock Pods
          pod install --repo-update
      # ===== Code signing (cert + provisioning profile) =====
      - name: Install signing certificate & provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/CertificateBBOLHackathon.p12"
          PP_PATH="$RUNNER_TEMP/ProvisionalCertificateBBOLHackathon.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROVISION_BASE64" | base64 --decode > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
      # ===== Build archive =====
      - name: Xcode Archive
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "${IOS_WORKSPACE}" \
            -scheme "${IOS_SCHEME}" \
            -configuration "${IOS_CONFIGURATION}" \
            -sdk iphoneos \
            -derivedDataPath "${DERIVED_DATA}" \
            -archivePath "${ARCHIVE_PATH}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="ProvisionalCertificateBBOLHackathon" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            clean archive
      # ===== Export IPA =====
      - name: Export IPA
        run: |
          set -euo pipefail
          mkdir -p "${EXPORT_PATH}"
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS_PLIST}" \
            -exportPath "${EXPORT_PATH}"
      # exportArchive usa ExportOptions.plist para firmar/exportar el .ipa. [1](https://fritz.ai/full-stack-ios-continuous-delivery-with-xcodebuild-and-exportoptions-plist/)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: |
            build/export/*.ipa