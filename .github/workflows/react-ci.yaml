# react-ci.yaml
name: React CI Workflow

on:
  workflow_dispatch:
  pull_request:
    branches: [master, develop]

jobs:
  build-analyze:
    name: Build, Test, SCA (OWASP) y CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Unit tests
        continue-on-error: true
        run: npm test -- --watch=false

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "bolivariano-react"
          path: "."
          format: "HTML"
          out: "reports"
          args: >
            --format SARIF
            --format JSON
            --enableRetired
            --exclude **/android/gradle/wrapper/gradle-wrapper.jar
            --failOnCVSS 9
            --disableYarnAudit

      - name: Upload OWASP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-reports
          path: reports

      - name: Upload OWASP SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/dependency-check-report.sarif

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-extended

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4