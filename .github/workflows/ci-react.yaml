# Workflow para configurar y analizar el proyecto react
name: CI React
# Incialmente se ejecutar manualmente, posteriormente al realizar un push o un pull request hacia la rama master
on:
  workflow_dispatch:

# Trabajos
jobs:
  build:

  runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test