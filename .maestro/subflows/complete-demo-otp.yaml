appId: com.bbapp
---
# PIN demo fijo: 123457
- extendedWaitUntil:
    visible:
      id: "otp-screen"
    timeout: 30000

- tapOn: "Digito 1"
- tapOn: "Digito 2"
- tapOn: "Digito 3"
- tapOn: "Digito 4"
- tapOn: "Digito 5"
- tapOn: "Digito 7"

# Tras OTP exitoso en login, la app navega a oferta biométrica y luego al tab Inicio.
- extendedWaitUntil:
    visible:
      id: "biometric-offer-screen"
    timeout: 30000

- tapOn:
    id: "biometric-offer-skip"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
