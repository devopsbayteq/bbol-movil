appId: com.bbapp
---
# PIN demo fijo: 123457
- extendedWaitUntil:
    visible:
      id: "otp-screen"
    timeout: 30000

- tapOn:
    id: "otp-input"
- inputText: "123457"

# Registro obligatorio de alias (post-OTP, pre-biometría)
- extendedWaitUntil:
    visible:
      id: "register-alias-screen"
    timeout: 30000

- tapOn:
    id: "register-alias-input"
- inputText: "demoalias"

- tapOn:
    id: "register-alias-continue"

# Modal de éxito (~5s) o cierre manual; luego oferta biométrica o Inicio
- extendedWaitUntil:
    visible:
      id: "biometric-offer-screen"
    timeout: 20000

- tapOn:
    id: "biometric-offer-skip"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
