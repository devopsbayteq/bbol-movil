appId: com.bbapp
---
# PIN demo fijo: 123456 - contexto de transferencia.
# Tras validar, OtpValidationScreen llama navigation.goBack() → vuelve a TransferReview,
# que ejecuta la transferencia y muestra la alerta "Transferencia exitosa".
- extendedWaitUntil:
    visible:
      id: "otp-screen"
    timeout: 30000

- tapOn: "Digito 1"
- tapOn: "Digito 2"
- tapOn: "Digito 3"
- tapOn: "Digito 4"
- tapOn: "Digito 5"
- tapOn: "Digito 6"

- extendedWaitUntil:
    visible: "Transferencia exitosa"
    timeout: 20000
