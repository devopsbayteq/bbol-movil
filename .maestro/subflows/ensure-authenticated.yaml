appId: com.bbapp
---
# Espera a que el splash (5s) y el fetch de clave pública terminen.
# Si ya hay sesión, la app aterriza en home-screen (tab Inicio).
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
    optional: true

# Si no estamos en home, hay que hacer login.
- runFlow:
    when:
      notVisible:
        id: "home-screen"
    commands:
      - runFlow:
          file: ensure-login-email-field-visible.yaml
      - tapOn:
          id: "login-email-input"
      - inputText: "Usuario10_2026"
      - tapOn:
          id: "login-password-input"
      - inputText: "Password@1"
      - hideKeyboard
      - tapOn:
          id: "login-submit"
      - runFlow:
          file: complete-demo-otp.yaml
