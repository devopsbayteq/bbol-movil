appId: com.bbapp
---
# Autenticación estable para el resto de E2E.
#
# Flujo real alineado con credenciales demo (README / MockAuthDataSource):
# usuario-demo12 + 123456 → OTP 123457 → (alias solo si primer ingreso en dispositivo) → biometría opcional → Inicio.
#
# Por defecto se fuerza el formulario completo (usuario + contraseña) con ensure-login-email-field-visible:
# en dispositivos ya vinculados, "Otro usuario" limpia el modo compacto para poder escribir el usuario de prueba.
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
    optional: true

- runFlow:
    when:
      notVisible:
        id: "home-screen"
    commands:
      - runFlow:
          file: ensure-login-email-field-visible.yaml
      - tapOn:
          id: "login-email-input"
      - inputText: "usuario-demo12"
      - tapOn:
          id: "login-password-input"
      - inputText: "123456"
      - hideKeyboard
      - runFlow:
          file: accept-login-terms.yaml
      - tapOn:
          id: "login-submit"
      - runFlow:
          file: complete-demo-otp.yaml
