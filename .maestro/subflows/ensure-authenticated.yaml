appId: com.bbapp
---
# Si ya hay sesión, la pantalla de movimientos aparece sin pedir credenciales.
- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 8000
    optional: true

# Sin sesión: login mock + OTP demo (123456).
- runFlow:
    when:
      notVisible:
        id: "transactions-screen"
    commands:
      - extendedWaitUntil:
          visible:
            id: "login-email-input"
          timeout: 25000
      - tapOn:
          id: "login-email-input"
      - inputText: "test@gmail.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "123456"
      - hideKeyboard
      - tapOn:
          id: "login-submit"
      - runFlow:
          file: complete-demo-otp.yaml
