appId: com.bbapp
---
# Garantiza estar en login: si hay sesión activa, cierra sesión primero.
- runFlow:
    when:
      visible:
        id: "home-screen"
    commands:
      - tapOn:
          id: "logout-button"
      - extendedWaitUntil:
          visible:
            id: "login-email-input"
          timeout: 20000
