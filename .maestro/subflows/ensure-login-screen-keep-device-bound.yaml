appId: com.bbapp
---
# Como ensure-login-screen.yaml, pero si hay que cerrar sesión desde Inicio NO ejecuta
# ensure-login-email-field-visible: el vínculo del dispositivo (DEVICE_BOUND_*) se conserva
# y la app queda en modo compacto (solo contraseña), como en un segundo login real.

- extendedWaitUntil:
    visible: ".*"
    timeout: 30000
    optional: true

- runFlow:
    when:
      visible:
        id: "otp-screen"
    commands:
      - pressKey: Back

- runFlow:
    when:
      visible:
        id: "home-screen"
    commands:
      - tapOn: "Movimientos"
      - extendedWaitUntil:
          visible:
            id: "transactions-screen"
          timeout: 15000
      - tapOn:
          id: "logout-button"

- extendedWaitUntil:
    visible:
      id: "login-password-input"
    timeout: 45000
