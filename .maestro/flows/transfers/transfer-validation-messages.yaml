appId: com.bayteq.bbapp.dev
name: Transferencias â€” validaciÃ³n al continuar sin datos
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-authenticated.yaml

- runFlow:
    file: ../../subflows/open-transfer-tab.yaml

- assertVisible: "TRANSFERIR"
- assertVisible: "Ingresa el monto a transferir"

- tapOn:
    id: "transfer-continue-button"

- extendedWaitUntil:
    visible: "Ingresa un monto mayor a cero."
    timeout: 10000

- tapOn:
    id: "transfer-amount-input"
# US$ 0,01; requiere saldo disponible > 0 en la cuenta de origen.
- inputText: "0.01"
- hideKeyboard

- tapOn:
    id: "transfer-continue-button"

- extendedWaitUntil:
    visible: "Selecciona un beneficiario."
    timeout: 10000

# --- 3. Con beneficiario, el concepto vÃ¡lido no bloquea el envÃ­o ---
- tapOn:
    id: "transfer-beneficiary-picker"

- extendedWaitUntil:
    visible:
      id: "beneficiary-select-modal"
    timeout: 20000

- tapOn:
    id: "beneficiary-first-own-account"

- extendedWaitUntil:
    visible:
      id: "transfer-main-screen"
    timeout: 15000

- tapOn:
    id: "transfer-concept-input"
- inputText: "Concepto valido"
- hideKeyboard

- tapOn:
    id: "transfer-continue-button"

- extendedWaitUntil:
    visible:
      id: "transfer-review-screen"
    timeout: 15000

- assertVisible: "Concepto valido"

