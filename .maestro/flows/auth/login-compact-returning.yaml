appId: com.bbapp
name: Login en dispositivo ya vinculado (modo compacto, sin pantalla de alias)
---
# Flujo real cuando ya hubo al menos un login exitoso en el mismo dispositivo:
# logout no borra el vínculo (DEVICE_BOUND_*), así que se muestra CompactLoginContent
# (saludo + solo contraseña). Tras OTP la app usa skipRegisterAlias y no pasa por RegisterAlias.
#
# Requisito: haber completado antes un login en la app (o ejecutar p. ej. login-success).
# No usar ensure-login-email-field-visible aquí (evitaría "Otro usuario" y el formulario completo).

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen-keep-device-bound.yaml

- tapOn:
    id: "login-password-input"
- inputText: "123456"
- hideKeyboard

- runFlow:
    file: ../../subflows/accept-login-terms.yaml

- tapOn:
    id: "login-submit"

- runFlow:
    file: ../../subflows/complete-demo-otp.yaml

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
