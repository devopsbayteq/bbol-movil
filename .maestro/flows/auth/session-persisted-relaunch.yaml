appId: com.bbapp
name: Sesión persistida — al reabrir la app no pide credenciales
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-authenticated.yaml

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000

- stopApp

- launchApp

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 40000

- assertVisible: "Bienvenido de vuelta"
- assertNotVisible:
    id: "login-email-input"
