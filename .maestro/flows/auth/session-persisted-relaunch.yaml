appId: com.bbapp
name: Sesión persistida — al reabrir la app no pide credenciales
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-authenticated.yaml

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 20000

- assertVisible: "usuario01"

- stopApp

- launchApp

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 20000

- assertVisible: "Mis Productos"
- assertNotVisible: "Ingresar"
- assertNotVisible:
    id: "login-email-input"
