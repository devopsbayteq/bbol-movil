appId: com.bbapp
name: PIN incorrecto muestra error en pantalla OTP
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen.yaml

# Esperar a que el splash termine y aparezca el login.
- runFlow:
    file: ../../subflows/ensure-login-email-field-visible.yaml

- tapOn:
    id: "login-email-input"
- inputText: "Usuario10_2026"

- tapOn:
    id: "login-password-input"
- inputText: "Password@1"

- hideKeyboard

- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible:
      id: "otp-screen"
    timeout: 30000

# PIN inválido: 111111 (el servidor rechaza cualquier código distinto al correcto)
- repeat:
    times: 6
    commands:
    - tapOn:
        label: "Digito 1"

- extendedWaitUntil:
    visible:
      id: "otp-error"
    timeout: 15000

- assertVisible: "El código ingresado es incorrecto."
