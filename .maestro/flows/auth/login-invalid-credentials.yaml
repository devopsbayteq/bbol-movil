appId: com.bbapp
name: Login fallido con credenciales inválidas
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen.yaml

- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 15000

- tapOn:
    id: "login-email-input"
- inputText: "usuario_invalido"

- tapOn:
    id: "login-password-input"
- inputText: "wrongpassword"

- hideKeyboard

- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible:
      id: "login-error"
    timeout: 20000

- assertVisible: "Credenciales inválidas"
- assertVisible: "Identidad Digital"
