appId: com.bayteq.bbapp.dev
name: Login fallido con credenciales inválidas
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen.yaml

# Esperar a que el splash termine y aparezca el login.
- runFlow:
    file: ../../subflows/ensure-login-email-field-visible.yaml

- tapOn:
    id: "login-email-input"
- inputText: "wrong-user-cred"

- tapOn:
    id: "login-password-input"
- inputText: "wrongpassword"

- hideKeyboard

- runFlow:
    file: ../../subflows/accept-login-terms.yaml

- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible:
      id: "login-error"
    timeout: 20000

# Sigue en pantalla de acceso (primer login o compacto con mensaje de error).
- assertVisible:
    id: "login-password-input"
