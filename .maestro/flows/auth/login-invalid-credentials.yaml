appId: com.bbapp
name: Login fallido con credenciales inválidas
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen.yaml

# Esperar a que el splash termine y aparezca el login.
- runFlow:
    file: ../../subflows/ensure-login-email-field-visible.yaml

- tapOn:
    id: "login-email-input"
- inputText: "usuario_invalido"

- tapOn:
    id: "login-password-input"
- inputText: "wrongpassword"

- hideKeyboard

- runFlow:
    file: ../../subflows/accept-login-terms.yaml

- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible:
      id: "login-error"
    timeout: 20000

- assertVisible: "Bienvenido a tu banca móvil"
