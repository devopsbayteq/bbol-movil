appId: com.bbapp
name: Login fallido con credenciales inválidas
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen.yaml

# Esperar a que el splash termine y aparezca el login.
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 30000

- tapOn:
    id: "login-email-input"
- inputText: "wrong-user-cred"

- tapOn:
    id: "login-password-input"
- inputText: "wrongpassword"

- hideKeyboard

- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible:
      id: "login-error"
    timeout: 20000

- assertVisible: "Identidad Digital"
