appId: com.bbapp
name: Login exitoso — llega al inicio con saldo y movimientos
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-authenticated.yaml

- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 20000

- assertVisible: "usuario01"
- assertVisible: "Saldo disponible"
- assertVisible: "$15,642.50"
- assertVisible: "Movimientos recientes"
- assertVisible: "Depósito de nómina"
