appId: com.bbapp
name: Credenciales válidas abren la pantalla de PIN (OTP)
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen.yaml

- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 15000

- tapOn:
    id: "login-email-input"
- inputText: "test@gmail.com"

- tapOn:
    id: "login-password-input"
- inputText: "123456"

- hideKeyboard

- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible:
      id: "otp-screen"
    timeout: 25000

- assertVisible: "AUTENTICACIÓN"
- assertVisible: "Introduce tu PIN para continuar"
