appId: com.bayteq.bbapp.dev
name: Credenciales válidas abren la pantalla OTP (enrolamiento)
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen.yaml

- runFlow:
    file: ../../subflows/ensure-login-email-field-visible.yaml

- tapOn:
    id: "login-email-input"
- inputText: "usuario-demo12"

- tapOn:
    id: "login-password-input"
- inputText: "Password@1"

- hideKeyboard

- runFlow:
    file: ../../subflows/accept-login-terms.yaml

- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible:
      id: "otp-screen"
    timeout: 30000

- assertVisible: "ENROLAMIENTO"
- assertVisible: "Verificación de seguridad"
