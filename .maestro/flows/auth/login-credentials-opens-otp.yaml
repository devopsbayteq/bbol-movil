appId: com.bbapp
name: Credenciales válidas abren la pantalla de PIN (OTP)
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen.yaml

# Esperar a que el splash termine y aparezca el login.
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 30000

- tapOn:
    id: "login-email-input"
- inputText: "usuario01"

- tapOn:
    id: "login-password-input"
- inputText: "123456"

- hideKeyboard

- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible:
      id: "otp-screen"
    timeout: 30000

- assertVisible: "AUTENTICACIÓN"
- assertVisible: "Introduce tu PIN para continuar"
