appId: com.bbapp
name: Login en dispositivo ya vinculado (modo compacto, sin pantalla de alias)
---
# Flujo real cuando ya hubo al menos un login exitoso en el mismo dispositivo.
# Nombre del archivo: orden alfabético justo después de login-success.yaml y antes de
# login-validation-fields.yaml (ese flujo usa clearState y borra el vínculo del dispositivo).
#
# No usar ensure-login-email-field-visible aquí (evitaría "Otro usuario" y el formulario completo).

- launchApp

- runFlow:
    file: ../../subflows/ensure-login-screen-keep-device-bound.yaml

- tapOn:
    id: "login-password-input"
- inputText: "123456"
- hideKeyboard

- runFlow:
    file: ../../subflows/accept-login-terms.yaml

- tapOn:
    id: "login-submit"

- runFlow:
    file: ../../subflows/complete-demo-otp.yaml

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000
