appId: com.bbapp
name: Logout y retorno a pantalla de login
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-authenticated.yaml

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000

- tapOn:
    id: "logout-button"

- runFlow:
    file: ../../subflows/ensure-login-email-field-visible.yaml

- assertVisible: "Identidad Digital"
- assertVisible:
    id: "login-submit"
