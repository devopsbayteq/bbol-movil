appId: com.bbapp
name: Logout y retorno a pantalla de login
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-authenticated.yaml

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 30000

# Navegar al tab Movimientos donde está el botón Salir.
- tapOn: "Movimientos"

- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 15000

- tapOn:
    id: "logout-button"

- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000

- assertVisible: "Identidad Digital"
- assertVisible:
    id: "login-submit"
