appId: com.bbapp
name: Logout y retorno a pantalla de login
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-authenticated.yaml

- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 20000

- tapOn:
    id: "logout-button"

- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000

- assertVisible: "Identidad Digital"
- assertVisible:
    id: "login-submit"
