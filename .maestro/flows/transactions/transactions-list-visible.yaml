appId: com.bbapp
name: Lista de transacciones y estados visibles
---

- launchApp

- runFlow:
    file: ../../subflows/ensure-authenticated.yaml

- tapOn: "Movimientos"

- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 20000

- assertVisible: "MOVIMIENTOS"
- assertVisible: "Movimientos"
- assertVisible:
    id: "movements-search-input"

- scrollUntilVisible:
    element:
      text: "Saldo"
    direction: DOWN
    timeout: 15000
